services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cermin-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_SSLMODE: disable
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: cermin-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-cermin_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cermin_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
