name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Production tag to deploy, for example prod_V1.2.3
        required: true
        type: string
  push:
    tags:
      - 'prod_V*.*.*'

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

env:
  DEPLOY_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest

    steps:
      - name: Validate production tag
        run: |
          if [[ ! "$DEPLOY_TAG" =~ ^prod_V[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid production tag: $DEPLOY_TAG"
            echo "Expected format: prod_Vx.x.x, for example prod_V1.2.3"
            exit 1
          fi

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build app
        run: go build ./cmd/api

      - name: Build Docker image
        run: docker build -t cermin-backend-api:${{ env.DEPLOY_TAG }} .

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: verify
    environment: production

    steps:
      - name: Setup SSH
        env:
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -p "$VPS_SSH_PORT" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy with Docker Compose
        env:
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          ssh -i ~/.ssh/vps_key -p "$VPS_SSH_PORT" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "DEPLOY_TAG='$DEPLOY_TAG' VPS_APP_DIR='$VPS_APP_DIR' bash -s" << 'EOF'
            set -e
            cd "$VPS_APP_DIR"
            git fetch --tags --force origin
            git checkout --force "$DEPLOY_TAG"
            docker compose up -d --build
            docker image prune -f
          EOF
